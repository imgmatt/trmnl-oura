<!-- TRMNL Oura Ring Dashboard — Half Horizontal (800x240) -->

<div class="layout">
  <div class="grid grid--cols-4 stretch-y">

    <div class="flex flex--col flex--center-y flex--center-x gap--xsmall p--small">
      <span class="title title--small">READINESS &#9733;</span>
      <span class="value value--xlarge value--tnums">{{ readiness_score }}</span>
      <span class="label label--small">HRV {{ sleep_average_hrv }}</span>
    </div>

    <div class="flex flex--col flex--center-y flex--center-x gap--xsmall p--small">
      <span class="title title--small">SLEEP &#9684;</span>
      <span class="value value--xlarge value--tnums">{{ sleep_score }}</span>
      <span class="label label--small">{{ sleep_total_sleep }}</span>
    </div>

    <div class="flex flex--col flex--center-y flex--center-x gap--xsmall p--small">
      <span class="title title--small">ACTIVITY &#9650;</span>
      <span class="value value--xlarge value--tnums">{{ activity_score }}</span>
      <span class="label label--small">{{ activity_steps }} steps</span>
    </div>

    <div class="flex flex--col flex--center-y flex--center-x gap--xsmall p--small">
      <span class="title title--small">HEART RATE &#9829;</span>
      <span class="value value--xlarge value--tnums">{{ hr_resting_hr }}</span>
      <span class="label label--small">Resting bpm</span>
    </div>

  </div>
</div>

<div class="title_bar">
  <span class="title">Oura Ring</span>
  <span class="instance">{{ updated_at }}</span>
</div>
