<!-- TRMNL Oura Ring Dashboard — Half Horizontal (800x240) -->

<div class="layout">
  <div class="columns">
    <div class="column">
      <div class="item item--emphasis-1">
        <div class="meta"></div>
        <div class="content">
          <span class="title title--small">READINESS &#9733;</span>
          <span class="value value--tnums">{{ readiness_score }}</span>
          <span class="label label--small">HRV {{ sleep_average_hrv }} &middot; {{ readiness_temperature_deviation }}</span>
        </div>
      </div>
    </div>
    <div class="column">
      <div class="item item--emphasis-1">
        <div class="meta"></div>
        <div class="content">
          <span class="title title--small">SLEEP &#9684;</span>
          <span class="value value--tnums">{{ sleep_score }}</span>
          <span class="label label--small">{{ sleep_total_sleep }} &middot; REM {{ sleep_rem_sleep }}</span>
        </div>
      </div>
    </div>
    <div class="column">
      <div class="item item--emphasis-1">
        <div class="meta"></div>
        <div class="content">
          <span class="title title--small">ACTIVITY &#9650;</span>
          <span class="value value--tnums">{{ activity_score }}</span>
          <span class="label label--small">{{ activity_steps }} steps</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="title_bar">
  <span class="title">Oura Ring</span>
  <span class="instance">{{ updated_at }}</span>
</div>
