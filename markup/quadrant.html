<!-- TRMNL Oura Ring Dashboard — Quadrant (400x240) -->

<style>
  .oura-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; width: 100%; height: 100%; align-items: stretch; overflow: hidden; }
  .oura-cell { padding: 8px 12px; display: flex; flex-direction: column; justify-content: flex-start; gap: 2px; min-height: 0; overflow: hidden; }
  .oura-header { display: flex; flex-direction: row; align-items: baseline; gap: 6px; margin-bottom: 2px; }
  .oura-icon { font-size: 11px; line-height: 1; position: relative; top: 1px; }
  .oura-icon--heart { font-size: 12px; top: 2px; }
  .oura-cell .value { line-height: 1.05; }
</style>

<div class="layout layout--col" style="width: 100%; gap: 0; height: 100%;">

  <div class="oura-grid">

    <!-- READINESS -->
    <div class="oura-cell" style="border-right: 1px solid var(--gray-65, #e0e0e0); border-bottom: 1px solid var(--gray-65, #e0e0e0);">
      <div class="oura-header">
        <span class="title title--small">READINESS</span>
        <span class="oura-icon">&#9733;</span>
      </div>
      <span class="value value--medium value--tnums">{{ readiness_score }}</span>
      <span class="label label--small">{{ readiness_temperature_deviation }}</span>
    </div>

    <!-- SLEEP -->
    <div class="oura-cell" style="border-bottom: 1px solid var(--gray-65, #e0e0e0);">
      <div class="oura-header">
        <span class="title title--small">SLEEP</span>
        <span class="oura-icon">&#9684;</span>
      </div>
      <span class="value value--medium value--tnums">{{ sleep_score }}</span>
      <span class="label label--small">{{ sleep_total_sleep }}</span>
    </div>

    <!-- ACTIVITY -->
    <div class="oura-cell" style="border-right: 1px solid var(--gray-65, #e0e0e0);">
      <div class="oura-header">
        <span class="title title--small">ACTIVITY</span>
        <span class="oura-icon">&#9650;</span>
      </div>
      <span class="value value--medium value--tnums">{{ activity_score }}</span>
      <span class="label label--small">{{ activity_steps }} steps</span>
    </div>

    <!-- HEART RATE -->
    <div class="oura-cell">
      <div class="oura-header">
        <span class="title title--small">HEART RATE</span>
        <span class="oura-icon oura-icon--heart">&#9829;</span>
      </div>
      <span class="value value--medium value--tnums">{{ hr_resting_hr }}</span>
      <span class="label label--small">bpm resting</span>
    </div>

  </div>

</div>

<div class="title_bar">
  <span class="title">Oura Ring</span>
  <span class="instance">{{ updated_at }}</span>
</div>
