<!-- TRMNL Oura Ring Dashboard — Quadrant (400x240) -->

<div class="layout layout--col gap--none">

  <div class="grid grid--cols-2 stretch-y">

    <!-- READINESS -->
    <div class="flex flex--col stretch-x stretch-y border--h-5">
      <div class="flex flex--row flex--center flex--center-y gap--xsmall p--small">
        <span class="title title--small">READINESS</span>
        <span class="label label--small">&#9733;</span>
      </div>
      <div class="flex flex--col flex--center flex--center-y stretch-y gap--xsmall">
        <span class="value value--large value--tnums">{{ readiness_score }}</span>
        <span class="label label--small">TEMP {{ readiness_temperature_deviation }}</span>
      </div>
    </div>

    <!-- SLEEP -->
    <div class="flex flex--col stretch-x stretch-y border--h-5">
      <div class="flex flex--row flex--center flex--center-y gap--xsmall p--small">
        <span class="title title--small">SLEEP</span>
        <span class="label label--small">&#9684;</span>
      </div>
      <div class="flex flex--col flex--center flex--center-y stretch-y gap--xsmall">
        <span class="value value--large value--tnums">{{ sleep_score }}</span>
        <span class="label label--small">TOTAL {{ sleep_total_sleep }}</span>
      </div>
    </div>

    <!-- ACTIVITY -->
    <div class="flex flex--col stretch-x stretch-y">
      <div class="flex flex--row flex--center flex--center-y gap--xsmall p--small">
        <span class="title title--small">ACTIVITY</span>
        <span class="label label--small">&#9650;</span>
      </div>
      <div class="flex flex--col flex--center flex--center-y stretch-y gap--xsmall">
        <span class="value value--large value--tnums">{{ activity_score }}</span>
        <span class="label label--small">STEPS {{ activity_steps }}</span>
      </div>
    </div>

    <!-- HEART RATE -->
    <div class="flex flex--col stretch-x stretch-y">
      <div class="flex flex--row flex--center flex--center-y gap--xsmall p--small">
        <span class="title title--small">HEART RATE</span>
        <span class="label label--small">&#9829;</span>
      </div>
      <div class="flex flex--col flex--center flex--center-y stretch-y gap--xsmall">
        <span class="value value--large value--tnums">{{ hr_resting_hr }}</span>
        <span class="label label--small">RESTING BPM</span>
      </div>
    </div>

  </div>

</div>

<div class="title_bar">
  <span class="title">Oura Ring</span>
  <span class="instance">{{ updated_at }}</span>
</div>
