<!-- TRMNL Oura Ring Dashboard — Quadrant (400x240) -->

<div class="layout">
  <div class="grid grid--cols-2 gap--xsmall stretch-y">
    <div class="item item--emphasis-1">
      <div class="meta"></div>
      <div class="content">
        <span class="title title--small">READINESS &#9733;</span>
        <span class="value value--small value--tnums">{{ readiness_score }}</span>
      </div>
    </div>
    <div class="item item--emphasis-1">
      <div class="meta"></div>
      <div class="content">
        <span class="title title--small">SLEEP &#9684;</span>
        <span class="value value--small value--tnums">{{ sleep_score }}</span>
        <span class="label label--small">{{ sleep_total_sleep }}</span>
      </div>
    </div>
    <div class="item item--emphasis-1">
      <div class="meta"></div>
      <div class="content">
        <span class="title title--small">ACTIVITY &#9650;</span>
        <span class="value value--small value--tnums">{{ activity_score }}</span>
        <span class="label label--small">{{ activity_steps }} steps</span>
      </div>
    </div>
    <div class="item item--emphasis-2">
      <div class="meta"></div>
      <div class="content">
        <span class="title title--small">HEART RATE &#9829;</span>
        <span class="value value--small value--tnums">{{ hr_resting_hr }}</span>
        <span class="label label--small">Resting BPM</span>
      </div>
    </div>
  </div>
</div>

<div class="title_bar">
  <span class="title">Oura Ring</span>
  <span class="instance">{{ updated_at }}</span>
</div>
