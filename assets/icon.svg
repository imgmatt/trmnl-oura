<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <!-- Background (transparent by default; uncomment for white fill if TRMNL requires a solid background)
  <rect width="240" height="240" fill="white"/>
  -->

  <!-- Outer ring: evokes a smart ring without copying Oura's exact proportions -->
  <circle cx="120" cy="120" r="78" fill="none" stroke="black" stroke-width="26"/>

  <!-- Sensor indicator: small filled dot at ~2 o'clock, implying a data point /
       reading. This is the distinguishing element from Oura's plain ring mark. -->
  <circle cx="178" cy="62" r="14" fill="black"/>
</svg>
